<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake Game</title>
  <style>
    canvas { background:#000; display:block; margin:0 auto; }
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const grid = 20;
let snake = [{x: 200, y: 200}];
let dir = {x: 0, y: -grid};
let food = {x: 0, y: 0};
function randomFood(){
  food.x = Math.floor(Math.random()*canvas.width/grid)*grid;
  food.y = Math.floor(Math.random()*canvas.height/grid)*grid;
}
function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0f0';
  snake.forEach(s=>ctx.fillRect(s.x, s.y, grid-1, grid-1));
  ctx.fillStyle = '#f00';
  ctx.fillRect(food.x, food.y, grid-1, grid-1);
}
function move(){
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s=>s.x===head.x && s.y===head.y)){
    clearInterval(gameLoop);
    alert('Game Over');
    return;
  }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    randomFood();
  } else {
    snake.pop();
  }
}
function key(e){
  switch(e.key){
    case 'ArrowUp': if(dir.y===0) dir = {x:0, y:-grid}; break;
    case 'ArrowDown': if(dir.y===0) dir = {x:0, y:grid}; break;
    case 'ArrowLeft': if(dir.x===0) dir = {x:-grid, y:0}; break;
    case 'ArrowRight': if(dir.x===0) dir = {x:grid, y:0}; break;
  }
}
randomFood();
window.addEventListener('keydown', key);
const gameLoop = setInterval(()=>{move(); draw();}, 100);
</script>
</body>
</html>
