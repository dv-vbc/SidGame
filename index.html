<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Snake Game</title>
  <style>
    /* 页面整体布局 */
    body{
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:100vh;
      background:linear-gradient(135deg, #1e1e2f, #2b2b3d);
      font-family:sans-serif;
      color:#eee;
    }
    h1{margin-top:20px;}
    canvas{background:#000;display:block;margin-top:15px;box-shadow:0 0 15px rgba(0,0,0,0.7);}
    /* 控制按钮 */
    #controls{margin-top:15px;}
    button{
      margin:0 6px;
      padding:6px 12px;
      background:#444;
      color:#fff;
      border:none;
      border-radius:4px;
      cursor:pointer;
      transition:background 0.2s;
    }
    button:hover{background:#666;}
    button:disabled{background:#222;cursor:default;}
    /* 信息栏 */
    #info{margin-top:12px;}
    /* 操作说明 */
    #instructions{
      max-width:420px;
      margin-top:20px;
      padding:12px;
      background:#2a2a3a;
      border-radius:6px;
      line-height:1.4;
    }
    #instructions strong{color:#ffeb3b;}
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="controls">
    <button id="startBtn">开始游戏 (S)</button>
    <button id="pauseBtn" disabled>暂停 (P)</button>
    <button id="resumeBtn" disabled>继续 (R)</button>
    <button id="restartBtn" disabled>重新开始 (N)</button>
  </div>
  <div id="info">
    <span id="score">得分: 0</span> |
    <span id="level">关卡: 1</span> |
    <span id="best">最高分: 0</span>
  </div>
  <div id="instructions">
    <strong>操作说明：</strong>
    <ul>
      <li>方向键 ↑ ↓ ← → 控制蛇的移动。</li>
      <li>按钮快捷键：S 开始，P 暂停，R 继续，N 重新开始。</li>
      <li>每吃 5 颗食物提升一级，蛇速随之加快。</li>
      <li>游戏结束后会记录本局得分，最高分保存在本地（localStorage）。</li>
    </ul>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const grid = 20;
    let snake, dir, food, gameOver, running, score, level, speed, intervalId;
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const bestEl = document.getElementById('best');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const restartBtn = document.getElementById('restartBtn');
    const BEST_KEY = 'sidgame_best_score';
    const HISTORY_KEY = 'sidgame_score_history';

    function initGame(){
      snake = [{x:200, y:200}];
      dir = {x:0, y:-grid};
      food = {x:0, y:0};
      gameOver = false;
      running = false;
      score = 0;
      level = 1;
      speed = 200; // 初始移动间隔（ms）
      updateUI();
    }
    function updateUI(){
      scoreEl.textContent = `得分: ${score}`;
      levelEl.textContent = `关卡: ${level}`;
      const best = localStorage.getItem(BEST_KEY) || 0;
      bestEl.textContent = `最高分: ${best}`;
    }
    function randomFood(){
      food.x = Math.floor(Math.random()*canvas.width/grid)*grid;
      food.y = Math.floor(Math.random()*canvas.height/grid)*grid;
    }
    function draw(){
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#0f0';
      snake.forEach(s=>ctx.fillRect(s.x, s.y, grid-1, grid-1));
      ctx.fillStyle = '#f00';
      ctx.fillRect(food.x, food.y, grid-1, grid-1);
    }
    function step(){
      if(!running) return;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      // 碰墙或撞到自己
      if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s=>s.x===head.x && s.y===head.y)){
        endGame();
        return;
      }
      snake.unshift(head);
      if(head.x===food.x && head.y===food.y){
        score++;
        if(score % 5 === 0){
          level++;
          speed = Math.max(50, speed - 30);
        }
        randomFood();
      } else {
        snake.pop();
      }
      updateUI();
      draw();
    }
    function startLoop(){
      clearInterval(intervalId);
      intervalId = setInterval(step, speed);
    }
    function endGame(){
      running = false;
      clearInterval(intervalId);
      gameOver = true;
      alert(`游戏结束！得分: ${score}`);
      const best = parseInt(localStorage.getItem(BEST_KEY)||'0',10);
      if(score > best) localStorage.setItem(BEST_KEY, score);
      const hist = JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
      hist.push({score, date:new Date().toISOString()});
      localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
      updateUI();
      // 按钮状态切换
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      resumeBtn.disabled = true;
      // 游戏结束后不显示重新开始按钮（可通过 ESC 重新开始）
      restartBtn.disabled = true;
      startBtn.style.display = 'inline-block';
      pauseBtn.style.display = 'none';
      resumeBtn.style.display = 'none';
      restartBtn.style.display = 'none';
    }
    function changeDir(e){
      if(!running) return;
      switch(e.key){
        case 'ArrowUp': if(dir.y===0) dir={x:0,y:-grid}; break;
        case 'ArrowDown': if(dir.y===0) dir={x:0,y:grid}; break;
        case 'ArrowLeft': if(dir.x===0) dir={x:-grid,y:0}; break;
        case 'ArrowRight': if(dir.x===0) dir={x:grid,y:0}; break;
      }
    }
    // 按钮点击逻辑，兼容显示/隐藏
    startBtn.onclick = ()=>{
      initGame();
      randomFood();
      draw();
      running = true;
      startLoop();
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
      restartBtn.disabled = true;
      startBtn.style.display = 'none';
      pauseBtn.style.display = 'inline-block';
      resumeBtn.style.display = 'none';
      restartBtn.style.display = 'none';
    };
    pauseBtn.onclick = ()=>{
      running = false;
      clearInterval(intervalId);
      pauseBtn.disabled = true;
      resumeBtn.disabled = false;
      // 在暂停时显示重新开始按钮，让玩家可以清空状态重新开始
      restartBtn.disabled = false;
      restartBtn.style.display = 'inline-block';
      pauseBtn.style.display = 'none';
      resumeBtn.style.display = 'inline-block';
    };
    resumeBtn.onclick = ()=>{
      if(gameOver) return;
      running = true;
      startLoop();
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
      pauseBtn.style.display = 'inline-block';
      resumeBtn.style.display = 'none';
    };
    restartBtn.onclick = ()=>{
      initGame();
      randomFood();
      draw();
      running = true;
      startLoop();
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
      restartBtn.disabled = true;
      startBtn.style.display = 'none';
      pauseBtn.style.display = 'inline-block';
      resumeBtn.style.display = 'none';
      restartBtn.style.display = 'none';
    };
    // 键盘快捷键（S,P,R,N）以及方向键，空格键用于状态切换，Esc 用于重新开始
    window.addEventListener('keydown', (e)=>{
      if(e.target !== document.body) return;
      const key = e.key.toLowerCase();
      // 空格键：在不同状态下分别对应开始/暂停/继续
      if(e.code === 'Space'){
        e.preventDefault();
        if(!startBtn.disabled){
          startBtn.click();
        } else if(!pauseBtn.disabled){
          pauseBtn.click();
        } else if(!resumeBtn.disabled){
          resumeBtn.click();
        }
        return;
      }
      // ESC 键：重新开始（仅在游戏结束后可用）
      if(e.code === 'Escape'){
        if(!restartBtn.disabled){
          e.preventDefault();
          restartBtn.click();
        }
        return;
      }
      // 其他快捷键
      if(key === 's' && !startBtn.disabled){ e.preventDefault(); startBtn.click(); }
      else if(key === 'p' && !pauseBtn.disabled){ e.preventDefault(); pauseBtn.click(); }
      else if(key === 'r' && !resumeBtn.disabled){ e.preventDefault(); resumeBtn.click(); }
      else if(key === 'n' && !restartBtn.disabled){ e.preventDefault(); restartBtn.click(); }
      else { changeDir(e); }
    });
    // 初始显示状态，只显示开始按钮
    initGame();
    draw();
    startBtn.style.display = 'inline-block';
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = 'none';
    restartBtn.style.display = 'none';
  </script>
</body>
</html>
